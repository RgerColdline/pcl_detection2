initial_enable: true

debug:
  timing_enable: true

livox_roi:
  uav_radius: 0.3
  max_coord: 20.0
  debug_level: 0

voxel:
  leaf_size: 0.05

map:
  decay_coeff: 0.1
  ini_intensity: 50
  registration_frame_num: 5
  local_frame_num: 15
  rebuild_every_n_frames: 5

register:
  max_correspondence_distance: 0.3  # ICP最大对应点距离(m)，建议0.2~0.8，越小越严格，越大越易错配
  max_iter: 100  # ICP最大迭代次数，建议20~80，越大越稳但更耗时
  transformation_epsilon: 1e-8  # 变换收敛阈值，建议1e-9~1e-5，越小越严格
  euclidean_fitness_epsilon: 0.001  # fitness收敛阈值，建议1e-5~1e-2，越小越严格
  max_fitness_score: 0.2  # 接受本次ICP的最大fitness，建议0.05~0.5，越小越保守
  max_translation_delta: 0.2  # 相对odom预测允许的最大平移修正(m)，建议0.1~1.0，比赛常用0.2~0.4
  max_rotation_delta_deg: 20.0  # 相对odom预测允许的最大旋转修正(deg)，建议5~30，比赛常用8~15
  submap_x_radius: 3.0  # 配准子图x半径(m)，建议2~5，越小越局部
  submap_y_radius: 3.0  # 配准子图y半径(m)，建议2~5，越小越局部
  submap_z_radius: 1.5  # 配准子图z半径(m)，建议1~3，越小越局部

roi:
  uav_radius: 0.3
  x_min: -0.5
  x_max: 4.1
  y_min: -1.0
  y_max: 3.9
  z_min: 0.3
  z_max: 1.5

dilation:
  radius: 0.1
  steps: 12

erosion:
  mean_k: 7 #越大过滤越狠
  thresh: 0.8 #越小过滤越狠

projection:
  plane_z: 0.7
